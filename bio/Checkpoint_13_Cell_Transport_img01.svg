<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" 
     width="800" height="470" style="background: white; font-family: Arial, Helvetica, sans-serif;">
  <text x="400" y="30" font-size="20" fill="#1565c0" text-anchor="middle" font-weight="bold">Cell Membrane Transport</text>
  <rect x="50" y="200" width="700" height="40" fill="#FFB74D" rx="20" opacity="0.8" />
  <text x="400" y="225" font-size="12" fill="#5D4037" text-anchor="middle" font-weight="normal">Cell Membrane (phospholipid bilayer)</text>
  <text x="400" y="170" font-size="16" fill="#1565c0" text-anchor="middle" font-weight="bold">OUTSIDE the cell</text>
  <text x="400" y="188" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal">(high concentration)</text>
  <text x="400" y="275" font-size="16" fill="#00695c" text-anchor="middle" font-weight="bold">INSIDE the cell</text>
  <text x="400" y="293" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal">(low concentration)</text>
  <rect x="60" y="310" width="220" height="140" fill="#e3f2fd" stroke="#1565c0" rx="4" />
  <text x="170" y="335" font-size="14" fill="#1565c0" text-anchor="middle" font-weight="bold">PASSIVE Transport</text>
  <text x="170" y="355" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal">No energy needed</text>
  <text x="170" y="380" font-size="12" fill="#333333" text-anchor="middle" font-weight="normal">• Simple diffusion</text>
  <text x="170" y="400" font-size="12" fill="#333333" text-anchor="middle" font-weight="normal">• Facilitated diffusion</text>
  <text x="170" y="420" font-size="12" fill="#333333" text-anchor="middle" font-weight="normal">• Osmosis (water)</text>
  <defs><marker id="arrow_170_160_170_260" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0" /></marker></defs>
  <line x1="170" y1="160" x2="170" y2="260" stroke="#1565c0" stroke-width="3" marker-end="url(#arrow_170_160_170_260)" />
  <text x="130" y="155" font-size="10" fill="#1565c0" text-anchor="middle" font-weight="bold">HIGH → LOW</text>
  <rect x="520" y="310" width="220" height="140" fill="#fff3e0" stroke="#e65100" rx="4" />
  <text x="630" y="335" font-size="14" fill="#e65100" text-anchor="middle" font-weight="bold">ACTIVE Transport</text>
  <text x="630" y="355" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal">Needs ATP energy</text>
  <text x="630" y="380" font-size="12" fill="#333333" text-anchor="middle" font-weight="normal">• Protein pumps</text>
  <text x="630" y="400" font-size="12" fill="#333333" text-anchor="middle" font-weight="normal">• Endocytosis (in)</text>
  <text x="630" y="420" font-size="12" fill="#333333" text-anchor="middle" font-weight="normal">• Exocytosis (out)</text>
  <defs><marker id="arrow_630_260_630_160" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100" /></marker></defs>
  <line x1="630" y1="260" x2="630" y2="160" stroke="#e65100" stroke-width="3" marker-end="url(#arrow_630_260_630_160)" />
  <text x="670" y="155" font-size="10" fill="#e65100" text-anchor="middle" font-weight="bold">LOW → HIGH</text>
  <circle cx="580" cy="160" r="15" fill="#FFF3E0" stroke="#e65100" stroke-width="2" />
  <text x="580" y="165" font-size="10" fill="#e65100" text-anchor="middle" font-weight="bold">ATP</text>
</svg>